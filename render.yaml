services:
  - type: web
    name: code-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: API_SECRET_KEY
        sync: false
      - key: INDEX_PATH
        value: /tmp/index    # free tier has no persistent disk — index lives in /tmp
      - key: REPO_PATH
        value: ""
